<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuiruMed – Presupuesto</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #888; font-family: Arial, sans-serif; padding: 8px; display: flex; justify-content: center; }
.paper { background: #fff; max-width: 800px; width: 100%; border: 2px solid #000; font-size: 12px; }

/* HEADER */
.hdr { display: flex; border-bottom: 2px solid #000; flex-wrap: wrap; }
.hdr-left { flex: 1; min-width: 200px; padding: 10px 14px; border-right: 2px solid #000; }
.hdr-logo { max-width: 200px; width: 100%; display: block; }
.hdr-addr { font-size: 11px; margin-top: 6px; line-height: 1.7; font-weight: 700; text-align: center; }
.hdr-iva { font-size: 9px; font-weight: 700; text-align: center; margin-top: 4px; letter-spacing: 1px; }
.hdr-mid { width: 54px; border-right: 2px solid #000; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; }
.hdr-right { flex: 1; min-width: 160px; padding: 10px 14px; }
.presup { font-size: 18px; font-weight: 900; letter-spacing: 1px; }
.num-row { display: flex; align-items: center; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
.num-txt { font-size: 14px; font-weight: 700; }
.btn-nuevo { background: #111; color: #fff; border: none; border-radius: 3px; padding: 3px 8px; font-size: 10px; cursor: pointer; }
.cuit-txt { font-size: 9px; margin-top: 6px; line-height: 1.7; }
.fecha-row { display: flex; align-items: center; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
.fecha-lbl { font-size: 11px; font-weight: 700; letter-spacing: 2px; }
.fecha-boxes { display: flex; gap: 3px; }
.fbox { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.fbox span { font-size: 7px; text-transform: uppercase; font-weight: 700; }
.fbox input { border: 1px solid #000; text-align: center; font-size: 12px; font-weight: 700; outline: none; background: #fff; height: 26px; padding: 1px; }
.nodoc { font-size: 8px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-top: 6px; word-spacing: 2px; }

/* CAMPOS */
.campo { display: flex; align-items: flex-end; gap: 6px; border-bottom: 1px solid #000; padding: 5px 10px; flex-wrap: wrap; min-height: 28px; }
.campo label { font-size: 11px; white-space: nowrap; }
.campo input { flex: 1; min-width: 80px; border: none; border-bottom: 1px solid #000; outline: none; background: #fff; font-size: 13px; padding: 2px 4px; font-family: Arial; }

/* IVA */
.iva-row { border-bottom: 1px solid #000; display: flex; align-items: center; flex-wrap: wrap; padding: 3px 8px; gap: 6px; min-height: 28px; }
.iva-lbl { font-weight: 700; font-size: 12px; margin-right: 4px; }
.iva-row label { display: flex; align-items: center; gap: 3px; cursor: pointer; font-size: 11px; white-space: nowrap; }
.iva-row input[type=checkbox] { width: 13px; height: 13px; }
.cuit-block { display: flex; align-items: center; gap: 5px; margin-left: 10px; }
.cuit-block b { font-size: 11px; white-space: nowrap; }
.cuit-block input { border: none; border-bottom: 1px solid #000; outline: none; background: #fff; font-size: 12px; padding: 2px 4px; width: 120px; }

/* COND */
.cond-row { border-bottom: 2px solid #000; display: flex; align-items: center; flex-wrap: wrap; padding: 3px 8px; gap: 8px; min-height: 28px; }
.cond-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; border-right: 2px solid #000; padding-right: 8px; margin-right: 4px; }
.cond-row label { display: flex; align-items: center; gap: 4px; cursor: pointer; font-size: 11px; font-weight: 700; }
.cond-row input[type=checkbox] { width: 14px; height: 14px; }
.remito-block { display: flex; align-items: center; gap: 5px; margin-left: 10px; border-left: 2px solid #000; padding-left: 10px; }
.remito-block b { font-size: 11px; white-space: nowrap; }
.remito-block input { border: none; border-bottom: 1px solid #000; outline: none; background: #fff; font-size: 12px; padding: 2px 4px; width: 80px; }

/* TABLA */
.tbl-wrap { overflow-x: auto; border-left: 2px solid #000; border-right: 2px solid #000; min-height: 300px; }
table { width: 100%; border-collapse: collapse; min-width: 340px; }
table thead tr { border-bottom: 2px solid #000; background: #fff; }
table thead th { padding: 6px; font-size: 11px; font-weight: 700; text-align: center; letter-spacing: 1px; text-transform: uppercase; border-right: 2px solid #000; }
table thead th:last-child { border-right: none; }
table tbody tr { border-bottom: 1px solid #000; }
table tbody td { border-right: 2px solid #000; padding: 0; height: 36px; }
table tbody td:last-child { border-right: none; }
table tbody td input { width: 100%; height: 36px; border: none; outline: none; background: #fff; font-size: 13px; padding: 0 8px; font-family: Arial; }
table tbody td.tc input { text-align: center; }
table tbody td.tr input { text-align: right; font-family: monospace; }
table tbody td input:focus { background: #f0fff0; }
.delbtn { background: none; border: none; cursor: pointer; color: #bbb; font-size: 18px; width: 100%; height: 36px; }
.delbtn:hover { color: #c00; }
.add-fila { width: 100%; padding: 8px; border: none; border-top: 1px dashed #aaa; border-bottom: 2px solid #000; border-left: 2px solid #000; border-right: 2px solid #000; background: #f5f5f5; font-size: 11px; text-transform: uppercase; color: #999; cursor: pointer; }

/* BOTTOM */
.bottom { display: flex; flex-wrap: wrap; border-top: 2px solid #000; }
.bot-left { flex: 1; min-width: 180px; padding: 8px 12px; border-right: 2px solid #000; }
.bot-line { display: flex; align-items: flex-end; margin-bottom: 8px; }
.bot-line label { font-size: 11px; white-space: nowrap; }
.bot-dots { flex: 1; border-bottom: 1px dotted #555; margin: 0 4px 2px; }
.bot-line input { border: none; border-bottom: 1px solid #aaa; outline: none; background: #fff; font-size: 12px; padding: 2px 4px; width: 90px; }
.bot-son { display: flex; align-items: flex-end; margin-bottom: 0; }
.bot-son label { font-size: 11px; white-space: nowrap; }
.bot-son input { flex: 1; border: none; border-bottom: 1px solid #aaa; outline: none; background: #fff; font-size: 12px; padding: 2px 4px; margin-left: 4px; }
.bot-right { display: flex; align-items: center; justify-content: flex-end; gap: 10px; padding: 12px 14px; white-space: nowrap; }
.total-lbl { font-size: 17px; font-weight: 900; }
.total-box { border: 2px solid #000; min-width: 130px; height: 38px; display: flex; align-items: center; justify-content: flex-end; padding: 0 10px; font-size: 16px; font-weight: 700; font-family: monospace; }

/* FIRMA */
.firma-row { border-top: 1px solid #000; display: flex; justify-content: flex-end; padding: 6px 16px 6px; }
.firma-inner { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.firma-linea { border-top: 1px dotted #555; min-width: 220px; text-align: center; padding-top: 3px; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: #444; }

/* IMPRENTA */
.imprenta { background: #000; color: #fff; display: flex; justify-content: space-between; padding: 5px 10px; font-size: 8px; flex-wrap: wrap; gap: 4px; }
.imp-brand { font-weight: 700; font-size: 10px; margin-bottom: 2px; }
.imp-der { text-align: right; line-height: 1.6; }

@media print {
  @page { size: A4; margin: 8mm; }
  html, body { background: white; padding: 0; margin: 0; }
  body { display: block; }
  .paper { border: 1.5px solid #000; max-width: 100%; width: 100%; overflow: visible !important; page-break-after: avoid; page-break-inside: avoid; }
  .delbtn, .add-fila, .btn-nuevo { display: none !important; }
  table tbody td { height: 20px !important; }
  table tbody td input { font-size: 11px !important; }
  .campo { min-height: 22px !important; padding: 3px 10px !important; }
  .tbl-wrap { min-height: unset !important; }
  .firma-row { padding: 4px 16px !important; display: flex !important; }
  .firma-inner { display: flex !important; flex-direction: column !important; align-items: center !important; }
  .firma-inner img { display: block !important; visibility: visible !important; opacity: 1 !important; max-width: 450px !important; max-height: 220px !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  .firma-linea { display: block !important; }
}
  }
  .firma-linea {
    visibility: visible !important;
    display: block !important;
  }
}

<script>
window.onload = () => {
  const d = new Date();
  document.getElementById('fDia').value = String(d.getDate()).padStart(2,'0');
  document.getElementById('fMes').value = String(d.getMonth()+1).padStart(2,'0');
  document.getElementById('fAnio').value = d.getFullYear();
  for(let i=0;i<15;i++) addFila();
};

let numSeq = 169;
function nuevoNum() {
  numSeq++;
  document.getElementById('numTxt').textContent = 'Nº 0002-' + String(numSeq).padStart(8,'0');
}

function addFila() {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="tc"><input type="number" min="0" inputmode="numeric" oninput="calcFila(this)"></td>
    <td><input type="text"></td>
    <td class="tr"><input type="number" min="0" step="0.01" inputmode="decimal" oninput="calcFila(this)"></td>
    <td class="tr"><input type="number" readonly tabindex="-1" style="background:#f5f5f5;color:#333"></td>
    <td style="text-align:center"><button class="delbtn" onclick="this.closest('tr').remove();calcTotal()">×</button></td>`;
  document.getElementById('tbody').appendChild(tr);
}

function calcFila(inp) {
  const tr = inp.closest('tr');
  const tds = tr.querySelectorAll('td');
  const c = parseFloat(tds[0].querySelector('input').value)||0;
  const p = parseFloat(tds[2].querySelector('input').value)||0;
  tds[3].querySelector('input').value = c*p > 0 ? (c*p).toFixed(2) : '';
  calcTotal();
}

function calcTotal() {
  let t = 0;
  document.querySelectorAll('#tbody tr').forEach(r => {
    t += parseFloat(r.querySelectorAll('td')[3].querySelector('input').value)||0;
  });
  const str = t.toLocaleString('es-AR',{minimumFractionDigits:2});
  document.getElementById('totalBox').textContent = str;
  document.getElementById('sonPesos').value = str;
}

function soloUno(cb) {
  document.querySelectorAll('.iva-row input[type=checkbox]').forEach(c => { if(c!==cb) c.checked=false; });
}
</script>
